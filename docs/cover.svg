    <linearGradient id="badgeB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.14"/>
    </linearGradient>

